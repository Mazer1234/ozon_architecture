services:
  controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    environment:
      CONTROLLER_ID: "${CONTROLLER_ID:-ctrl-0001}"
      CITY: "${CITY:-moscow}"
      TELEMETRY_TOPIC: "${TELEMETRY_TOPIC:-telemetry.v1}"
      COMMAND_TOPIC: "${COMMAND_TOPIC:-command.v1}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:29092}"
      KAFKA_PRODUCER_ACKS: "${KAFKA_PRODUCER_ACKS:-all}"
      KAFKA_PRODUCER_ENABLE_IDEMPOTENCE: "${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:-true}"
      KAFKA_PRODUCER_RETRIES: "${KAFKA_PRODUCER_RETRIES:-5}"
      KAFKA_PRODUCER_RETRY_BACKOFF_MS: "${KAFKA_PRODUCER_RETRY_BACKOFF_MS:-100}"
      KAFKA_PRODUCER_REQUEST_TIMEOUT_MS: "${KAFKA_PRODUCER_REQUEST_TIMEOUT_MS:-30000}"

      MQTT_HOST: "${MQTT_HOST:-emqx}"
      MQTT_PORT: "${MQTT_PORT:-1883}"

      MQTT_TELEMETRY_TOPIC_PREFIX: "${MQTT_TELEMETRY_TOPIC_PREFIX:-v1/telemetry}"
      MQTT_COMAND_TOPIC_PREFIX: "${MQTT_COMMAND_TOPIC_PREFIX:-v1/command}"
      MQTT_ACK_TOPIC_PREFIX: "${MQTT_ACK_TOPIC_PREFIX:-v1/ack}"
      MQTT_QOS: "${MQTT_QOS:-1}"

      SEND_INTERVAL_SEC: "${SEND_INTERVAL_SEC:-5}"
      BASE_WATTS: "${BASE_WATTS:-120}"
      NOISE_WATTS: "${NOISE_WATTS:-30}"
      ENABLE_ACK: "${ENABLE_ACK:-0}"

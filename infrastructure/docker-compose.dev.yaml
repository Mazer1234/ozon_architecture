services:
  zookeeper:
    ports:
      - "2181:2181"

  kafka1:
    ports:
      - "29092:29092"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://host.docker.internal:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

  kafka2:
    ports:
      - "29093:29093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka2:9092,PLAINTEXT_HOST://host.docker.internal:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

  kafka3:
    ports:
      - "29094:29094"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka3:9092,PLAINTEXT_HOST://host.docker.internal:29094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo 'waiting for kafka...';
      cub kafka-ready -b kafka1:9092 3 120 || exit 1;

      echo 'ensure telemetry.v1';
      kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists --topic telemetry.v1 --partitions 96 --replication-factor 3 --config min.insync.replicas=2;

      # если топик был создан ранее с меньшим числом партиций — увеличим
      kafka-topics --bootstrap-server kafka1:9092 --alter --topic telemetry.v1 --partitions 96 || true;
      kafka-configs --bootstrap-server kafka1:9092 --entity-type topics --entity-name telemetry.v1 --alter --add-config min.insync.replicas=2 || true;

      echo 'ensure command.v1';
      kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists --topic command.v1 --partitions 96 --replication-factor 3 --config min.insync.replicas=2;

      # если топик был создан ранее с меньшим числом партиций — увеличим
      kafka-topics --bootstrap-server kafka1:9092 --alter --topic command.v1 --partitions 96 || true;
      kafka-configs --bootstrap-server kafka1:9092 --entity-type topics --entity-name command.v1 --alter --add-config min.insync.replicas=2 || true;

      echo 'done';
      "

  kafka-ui:
    ports:
      - "8080:8080"

  timescaledb:
    ports:
      - "5432:5432"

  emqx:
    ports:
      - "1883:1883"
      - "18083:18083"
